services:
  redis:
    image: redis:7-alpine
    container_name: diffusion-llm-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  inference:
    build:
      context: .
      dockerfile: Dockerfile
    image: diffusion-llm:latest
    container_name: diffusion-llm-inference
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7860:7860"
    command:
      - --model-dir
      - /models/model
      - --public
    environment:
      - PYTHONUNBUFFERED=1
      - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-3}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-3}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-3}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ALLOW_FAKE_REDIS=${ALLOW_FAKE_REDIS:-false}
      - MAX_CONCURRENT_RUNS=${MAX_CONCURRENT_RUNS:-1}
      - MAX_QUEUED_RUNS=${MAX_QUEUED_RUNS:-5}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-60}
      - MAX_PROMPT_CHARS=${MAX_PROMPT_CHARS:-1000}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS:-8000}
      - MAX_STEPS=${MAX_STEPS:-48}
      - MAX_MAX_LEN=${MAX_MAX_LEN:-512}
      - MAX_SQL_LEN=${MAX_SQL_LEN:-128}
      - RUN_TTL_SECONDS=${RUN_TTL_SECONDS:-900}
      - START_RUN_RATE_LIMIT=${START_RUN_RATE_LIMIT:-30 per minute; 300 per hour}
      - ADAPTIVE_RATE_LIMITS=${ADAPTIVE_RATE_LIMITS:-true}
      - IDLE_STARTS_PER_MINUTE=${IDLE_STARTS_PER_MINUTE:-12}
      - NORMAL_STARTS_PER_MINUTE=${NORMAL_STARTS_PER_MINUTE:-6}
      - BUSY_STARTS_PER_MINUTE=${BUSY_STARTS_PER_MINUTE:-2}
      - ETA_FALLBACK_SECONDS=${ETA_FALLBACK_SECONDS:-25}
      - FIRST_FRAME_FALLBACK_SECONDS=${FIRST_FRAME_FALLBACK_SECONDS:-8}
      - RESULT_CACHE_ENABLED=${RESULT_CACHE_ENABLED:-true}
      - RESULT_CACHE_TTL_SECONDS=${RESULT_CACHE_TTL_SECONDS:-86400}
      - RESULT_CACHE_VERSION=${RESULT_CACHE_VERSION:-v1}
    volumes:
      - ${MODEL_DIR:-/opt/diffusion/model}:/models/model:ro
    restart: unless-stopped
    mem_limit: ${WEB_MEM_LIMIT:-2g}
    cpus: ${WEB_CPUS:-1.0}

  worker:
    image: diffusion-llm:latest
    container_name: diffusion-llm-worker
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["python", "src/inference.py", "--worker", "--model-dir", "/models/model"]
    environment:
      - PYTHONUNBUFFERED=1
      - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-3}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-3}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-3}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ALLOW_FAKE_REDIS=${ALLOW_FAKE_REDIS:-false}
      - MAX_CONCURRENT_RUNS=${MAX_CONCURRENT_RUNS:-1}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-60}
      - RUN_TTL_SECONDS=${RUN_TTL_SECONDS:-900}
    volumes:
      - ${MODEL_DIR:-/opt/diffusion/model}:/models/model:ro
    restart: unless-stopped
    mem_limit: ${WORKER_MEM_LIMIT:-4g}
    cpus: ${WORKER_CPUS:-3.0}

volumes:
  redis_data:
